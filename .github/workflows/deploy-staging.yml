name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (e.g. "operator unblock VAN-62")'
        required: false
        default: 'manual trigger'

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 345307375390.dkr.ecr.eu-west-2.amazonaws.com
  ECS_CLUSTER: vb-staging-uk

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Bootstrap ECR repositories (idempotent)
        run: |
          for repo in vb/staging/api vb/staging/web vb/staging/ml; do
            aws ecr describe-repositories --repository-names "$repo" --region ${{ env.AWS_REGION }} 2>/dev/null || \
              aws ecr create-repository --repository-name "$repo" --region ${{ env.AWS_REGION }}
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/api:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/web:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.staging.vb.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ML
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ml/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/ml:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run DB migrations
        run: |
          SUBNET="${{ secrets.STAGING_PRIVATE_SUBNET_ID }}"
          SG="${{ secrets.STAGING_ECS_SG_ID }}"
          SUBNET="${SUBNET:-subnet-04e3a0f15eb306f8c}"
          SG="${SG:-sg-052c8f30dae075822}"
          ASSIGN_IP="DISABLED"
          [ "$SUBNET" = "subnet-04e3a0f15eb306f8c" ] && ASSIGN_IP="ENABLED"
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition vb-staging-uk-api \
            --overrides '{"containerOverrides":[{"name":"api","command":["yarn","prisma","migrate","deploy"]}]}' \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNET}],securityGroups=[${SG}],assignPublicIp=${ASSIGN_IP}}" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || { echo "Migration failed"; exit 1; }

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service vb-staging-uk-api \
            --desired-count 1 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Web service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service vb-staging-uk-web \
            --desired-count 1 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy ML service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service vb-staging-uk-ml \
            --desired-count 1 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services vb-staging-uk-api vb-staging-uk-web vb-staging-uk-ml \
            --region ${{ env.AWS_REGION }}
