name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (e.g. "operator unblock VAN-62")'
        required: false
        default: 'manual trigger'

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 345307375390.dkr.ecr.eu-west-2.amazonaws.com
  ECS_CLUSTER: vb-staging-uk

jobs:
  terraform:
    name: Terraform Apply (Staging Infra)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # S3 state bucket is in us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infra/terraform/staging
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform/staging
        env:
          AWS_DEFAULT_REGION: eu-west-2
          TF_VAR_db_password:               ${{ secrets.TF_STAGING_DB_PASSWORD }}
          TF_VAR_jwt_secret:                ${{ secrets.TF_STAGING_JWT_SECRET }}
          TF_VAR_nextauth_secret:           ${{ secrets.TF_STAGING_NEXTAUTH_SECRET }}
          TF_VAR_auth_secret:               ${{ secrets.TF_STAGING_AUTH_SECRET }}
          TF_VAR_upstash_redis_url:         ${{ secrets.TF_STAGING_UPSTASH_REDIS_URL }}
          TF_VAR_upstash_redis_rest_url:    ${{ secrets.TF_STAGING_UPSTASH_REDIS_REST_URL }}
          TF_VAR_upstash_redis_rest_token:  ${{ secrets.TF_STAGING_UPSTASH_REDIS_REST_TOKEN }}
          TF_VAR_openai_api_key:            ${{ secrets.TF_STAGING_OPENAI_API_KEY }}
          TF_VAR_datadog_api_key:           ${{ secrets.TF_STAGING_DATADOG_API_KEY }}
          TF_VAR_unsubscribe_secret:        ${{ secrets.TF_STAGING_UNSUBSCRIBE_SECRET }}
          TF_VAR_google_client_id:          ${{ secrets.TF_STAGING_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:      ${{ secrets.TF_STAGING_GOOGLE_CLIENT_SECRET }}
          TF_VAR_linkedin_client_id:        ${{ secrets.TF_STAGING_LINKEDIN_CLIENT_ID }}
          TF_VAR_linkedin_client_secret:    ${{ secrets.TF_STAGING_LINKEDIN_CLIENT_SECRET }}
          TF_VAR_acm_cert_arn:              ${{ secrets.TF_STAGING_ACM_CERT_ARN }}
        run: terraform apply -auto-approve

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Bootstrap ECR repositories (idempotent)
        run: |
          for repo in vb/staging/api vb/staging/web vb/staging/ml; do
            aws ecr describe-repositories --repository-names "$repo" --region ${{ env.AWS_REGION }} 2>/dev/null || \
              aws ecr create-repository --repository-name "$repo" --region ${{ env.AWS_REGION }}
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/api:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/web:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.staging.vb.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ML
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ml/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/ml:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS (Staging)
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service vb-staging-uk-api \
            --desired-count 1 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Web service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service vb-staging-uk-web \
            --desired-count 1 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy ML service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service vb-staging-uk-ml \
            --desired-count 1 \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services vb-staging-uk-api vb-staging-uk-web vb-staging-uk-ml \
            --region ${{ env.AWS_REGION }}

      - name: Run DB migrations
        continue-on-error: true
        run: |
          SUBNET="${{ secrets.STAGING_PRIVATE_SUBNET_ID }}"
          SG="${{ secrets.STAGING_ECS_SG_ID }}"
          # Fall back to default public subnet/SG if staging-specific secrets not yet set
          SUBNET="${SUBNET:-subnet-04e3a0f15eb306f8c}"
          SG="${SG:-sg-052c8f30dae075822}"
          ASSIGN_IP="DISABLED"
          # Public subnets require ENABLED; detect by absence of 'private' in subnet name
          [ "$SUBNET" = "subnet-04e3a0f15eb306f8c" ] && ASSIGN_IP="ENABLED"
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition vb-staging-uk-api \
            --overrides '{"containerOverrides":[{"name":"api","command":["yarn","prisma","migrate","deploy"]}]}' \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNET}],securityGroups=[${SG}],assignPublicIp=${ASSIGN_IP}}" \
            --region ${{ env.AWS_REGION }}
