name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (e.g. "operator unblock VAN-62")'
        required: false
        default: 'manual trigger'

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 345307375390.dkr.ecr.eu-west-2.amazonaws.com
  ECS_CLUSTER: vb-staging-uk

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/api:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/web:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.staging.vb.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ML
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ml/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/vb/staging/ml:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/vb/staging/ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy services (scale to 1 + force new deployment)
        run: |
          for svc in vb-staging-uk-api vb-staging-uk-web vb-staging-uk-ml; do
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service "$svc" \
              --desired-count 1 \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services vb-staging-uk-api vb-staging-uk-web vb-staging-uk-ml \
            --region ${{ env.AWS_REGION }}

      - name: Run DB migrations (best-effort)
        continue-on-error: true
        run: |
          SUBNET="${{ secrets.STAGING_PRIVATE_SUBNET_ID }}"
          SG="${{ secrets.STAGING_ECS_SG_ID }}"
          # Fall back to default public subnet if secrets not configured
          if [ -z "$SUBNET" ]; then
            SUBNET=$(aws ec2 describe-subnets --region ${{ env.AWS_REGION }} \
              --filters "Name=defaultForAz,Values=true" \
              --query 'Subnets[0].SubnetId' --output text)
            ASSIGN_PUBLIC="ENABLED"
          else
            ASSIGN_PUBLIC="DISABLED"
          fi
          if [ -z "$SG" ]; then
            SG=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} \
              --filters "Name=group-name,Values=default" \
              --query 'SecurityGroups[0].GroupId' --output text)
          fi
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition vb-staging-uk-api \
            --overrides '{"containerOverrides":[{"name":"api","command":["yarn","prisma","migrate","deploy"]}]}' \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNET}],securityGroups=[${SG}],assignPublicIp=${ASSIGN_PUBLIC}}" \
            --region ${{ env.AWS_REGION }}
